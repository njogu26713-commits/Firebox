<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebox — Pair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #040810;
      --bg2:     #070d1a;
      --bg3:     #0b1425;
      --border:  #152035;
      --border2: #1e3050;
      --blue:    #3b82f6;
      --text:    #e2e8f0;
      --muted:   #4a6080;
      --green:   #22c55e;
      --red:     #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
      background-image: radial-gradient(ellipse 80% 40% at 50% -20%, rgba(59,130,246,.1) 0%, transparent 70%);
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(4,8,16,.88); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; display: flex; align-items: center; gap: 24px;
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 14px 0; text-decoration: none; }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; box-shadow: 0 0 20px rgba(245,158,11,.35);
    }
    .brand-text h1 { font-size: 1.15rem; font-weight: 800; color: #fff; }
    .brand-text span { font-size: 0.72rem; color: var(--muted); }
    nav { margin-left: auto; display: flex; gap: 2px; }
    nav a {
      padding: 7px 18px; text-decoration: none; color: var(--muted);
      font-size: 0.85rem; font-weight: 600; border-radius: 8px; transition: all .2s;
    }
    nav a:hover { color: var(--text); background: var(--bg3); }
    nav a.active { color: var(--blue); background: rgba(59,130,246,.12); }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 22px; overflow: hidden;
      width: 100%; max-width: 480px;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }

    /* ── CARD HEADER ─────────────────────────────────────────── */
    .card-hdr {
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    .card-hdr h2 { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .card-hdr p  { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

    /* ── CARD BODY ───────────────────────────────────────────── */
    .card-body { padding: 28px 32px 32px; display: flex; flex-direction: column; gap: 20px; }

    .field-label {
      font-size: 0.68rem; font-weight: 700; color: var(--blue);
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .input-row { display: flex; gap: 8px; }
    input[type=tel], input[type=text] {
      flex: 1; padding: 11px 14px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 10px; color: #fff; font-size: 0.9rem;
      font-family: 'Inter', sans-serif; transition: border-color .2s;
    }
    input:focus { outline: none; border-color: var(--blue); }

    /* ── CODE DISPLAY ────────────────────────────────────────── */
    .code-box {
      background: var(--bg); border: 1px solid rgba(59,130,246,.4);
      border-radius: 14px; padding: 22px; text-align: center;
    }
    .code-digits {
      font-size: 2.6rem; font-weight: 900; color: var(--blue);
      letter-spacing: 10px; font-family: 'JetBrains Mono', monospace;
    }
    .code-hint { font-size: 0.74rem; color: var(--muted); margin-top: 10px; line-height: 1.7; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 0.88rem; font-weight: 600; padding: 10px 20px;
      transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-blue  { background: var(--blue); color: #fff; box-shadow: 0 4px 14px rgba(59,130,246,.3); }
    .btn-ghost { background: var(--bg3); color: #94a3b8; border: 1px solid var(--border); }
    .btn-full  { width: 100%; justify-content: center; padding: 13px; font-size: 0.95rem; border-radius: 12px; }

    /* ── FOOTER STATUS ───────────────────────────────────────── */
    .card-footer {
      padding: 14px 28px; background: rgba(0,0,0,.25);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; font-size: 0.82rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-idle { background: #2a3d55; }
    .dot-busy { background: #f59e0b; animation: blink 1s infinite; }
    .dot-on   { background: var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg3); color: var(--text); border: 1px solid var(--border2);
      padding: 12px 20px; border-radius: 12px; font-size: 0.85rem;
      opacity: 0; transition: opacity .3s, transform .3s; z-index: 200;
      max-width: 340px; transform: translateY(8px);
    }
    .toast.show    { opacity: 1; transform: translateY(0); }
    .toast.success { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.3); color: var(--green); }
    .toast.error   { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.2); color: var(--red); }

    @media (max-width: 540px) {
      header { padding: 0 16px; }
      .brand-text span { display: none; }
      .card-hdr, .card-body { padding-left: 20px; padding-right: 20px; }
      .code-digits { font-size: 1.9rem; letter-spacing: 6px; }
      .toast { left: 16px; right: 16px; bottom: 16px; max-width: none; }
    }
  </style>
</head>
<body>

<header>
  <a class="brand" href="/pair">
    <div class="brand-icon">🔥</div>
    <div class="brand-text"><h1>Firebox</h1><span>WhatsApp Bot</span></div>
  </a>
  <nav>
    <a href="/pair" class="active">Pair</a>
  </nav>
</header>

<div class="container">
  <div class="card">

    <div class="card-hdr">
      <h2>📲 Get a Pairing Code</h2>
      <p>Enter your WhatsApp number to receive an 8-digit pairing code — no camera needed.</p>
    </div>

    <div class="card-body">

      <!-- Session name -->
      <div>
        <div class="field-label">SESSION NAME (optional)</div>
        <input type="text" id="pair-name" placeholder="e.g. Brayan's Bot, John's Bot…" />
      </div>

      <!-- Phone + Get Code -->
      <div>
        <div class="field-label">PHONE NUMBER</div>
        <div class="input-row">
          <input type="tel" id="pair-phone" placeholder="254712345678" />
          <button class="btn btn-ghost" id="get-code-btn" onclick="getPairingCode()">Get Code</button>
        </div>
      </div>

      <!-- Pairing code display -->
      <div class="code-box" id="code-box" style="display:none">
        <div class="code-digits" id="code-value">—</div>
        <div class="code-hint">
          WhatsApp → Linked Devices → Link with phone number → enter this code
        </div>
        <button class="btn btn-ghost" style="margin-top:14px" onclick="copyCode()">📋 Copy Code</button>
      </div>

      <!-- Start button -->
      <button class="btn btn-blue btn-full" id="start-btn" onclick="startPairing()">⚡ Start Pairing</button>

    </div>

    <div class="card-footer">
      <div class="dot dot-idle" id="status-dot"></div>
      <span id="status-txt" style="color:var(--muted)">Idle — click Start Pairing to begin</span>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let pairingId = null, pollTimer = null;

  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 3500);
  }

  function setStatus(cls, color, text) {
    document.getElementById('status-dot').className = 'dot ' + cls;
    const el = document.getElementById('status-txt');
    el.style.color = color; el.textContent = text;
  }

  // ── Start session ───────────────────────────────────────────
  async function startPairing() {
    const btn = document.getElementById('start-btn');
    btn.disabled = true; btn.textContent = '⏳ Starting…';
    setStatus('dot-busy', '#f59e0b', 'Starting session…');
    const name = document.getElementById('pair-name').value.trim() || null;
    try {
      const res = await fetch('/api/sessions', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name || ('Bot ' + Date.now()) })
      });
      const s = await res.json();
      if (s.id) {
        pairingId = s.id;
        setStatus('dot-busy', '#f59e0b', 'Session ready — enter your number and click Get Code');
        toast('Session started');
        schedPoll();
      } else {
        toast(s.error || 'Failed to start', 'error');
        reset();
      }
    } catch (e) {
      toast('Error: ' + e.message, 'error');
      reset();
    }
    btn.disabled = false; btn.textContent = '⚡ Start Pairing';
  }

  // ── Get pairing code ────────────────────────────────────────
  async function getPairingCode() {
    const phone = document.getElementById('pair-phone').value.trim();
    if (!phone) { toast('Enter your phone number first', 'error'); return; }
    if (!pairingId) { toast('Click Start Pairing first', 'error'); return; }
    const btn = document.getElementById('get-code-btn');
    btn.disabled = true; btn.textContent = '…';
    try {
      const res = await fetch(`/api/sessions/${pairingId}/pairing`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number: phone })
      });
      const d = await res.json();
      if (d.code) {
        document.getElementById('code-value').textContent = d.code;
        document.getElementById('code-box').style.display = 'block';
        setStatus('dot-busy', '#f59e0b', 'Enter the code in WhatsApp…');
        toast('Pairing code ready!', 'success');
      } else {
        toast(d.error || 'Failed to get code', 'error');
      }
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Get Code';
  }

  function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-value').textContent)
      .then(() => toast('Code copied!', 'success'));
  }

  // ── Poll until connected ────────────────────────────────────
  function schedPoll() {
    clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      if (!pairingId) return;
      try {
        const res = await fetch('/api/sessions');
        const sessions = (await res.json()).sessions || [];
        const s = sessions.find(s => s.id === pairingId);
        if (!s) return;
        if (s.pairingCode) {
          document.getElementById('code-value').textContent = s.pairingCode;
          document.getElementById('code-box').style.display = 'block';
        }
        if (s.status === 'connected') {
          clearInterval(pollTimer);
          setStatus('dot-on', 'var(--green)', '✅ Connected! Check your WhatsApp — your Session ID was sent. Paste it on the Config page to deploy.');
          toast('✅ Bot connected! Session ID sent to your WhatsApp.', 'success');
          pairingId = null;
        }
      } catch {}
    }, 3000);
  }

  function reset() {
    setStatus('dot-idle', 'var(--muted)', 'Idle — click Start Pairing to begin');
  }
</script>
</body>
</html>
