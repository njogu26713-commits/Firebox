version: '3.9'

services:
  firebox:
    build: .
    container_name: firebox-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./session:/app/session
      - ./tmp:/app/tmp
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
